<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEB · Patcher &amp; Upload</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              graphite: "#14181b",
              panel: "#1c2125",
              line: "#2a3136",
              ink: "#e8ebec",
              faint: "#868d92",
              amber: "#e8a33d",
              teal: "#3fd2c1",
              danger: "#e5575c",
            },
            fontFamily: {
              display: ['"Space Grotesk"', "sans-serif"],
              sans: ['"Inter"', "sans-serif"],
              mono: ['"JetBrains Mono"', "monospace"],
            },
          },
        },
      };
    </script>
    <style>
      .btn-download-yellow {
        background: #e8a33d;
        color: #14181b;
        font-weight: 700;
        font-size: 1.05rem;
        padding: 0.85rem 2.2rem;
        border-radius: 9999px;
        box-shadow: 0 0 0 0 rgba(232, 163, 61, 0.3), 0 8px 24px rgba(232, 163, 61, 0.2);
        transition: all 0.2s ease;
        letter-spacing: 0.01em;
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        border: 1px solid rgba(255, 215, 120, 0.2);
      }
      .btn-download-yellow:hover {
        background: #d4912e;
        transform: scale(1.02);
        box-shadow: 0 0 28px rgba(232, 163, 61, 0.5), 0 8px 28px rgba(232, 163, 61, 0.3);
      }
      .btn-download-yellow:active {
        transform: scale(0.97);
      }
      .btn-download-yellow svg {
        width: 1.4rem;
        height: 1.4rem;
        stroke-width: 2.2;
      }
      .upload-zone {
        border: 2px dashed #2a3136;
        transition: border-color 0.2s, background 0.15s;
        background: #181e22;
      }
      .upload-zone:hover,
      .upload-zone.drag-over {
        border-color: #e8a33d;
        background: #1e252b;
      }
      .upload-zone .icon-upload {
        opacity: 0.6;
        transition: opacity 0.2s;
      }
      .upload-zone:hover .icon-upload {
        opacity: 1;
      }
      .led-pulse {
        animation: pulse-glow 1.4s ease-in-out infinite;
      }
      @keyframes pulse-glow {
        0%,
        100% {
          opacity: 1;
          box-shadow: 0 0 0 0 rgba(232, 163, 61, 0.5);
        }
        50% {
          opacity: 0.7;
          box-shadow: 0 0 12px 4px rgba(232, 163, 61, 0.15);
        }
      }
      .toast {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        background: #1c2125;
        border: 1px solid #2a3136;
        border-radius: 12px;
        padding: 1rem 1.5rem;
        box-shadow: 0 12px 40px rgba(0,0,0,0.6);
        transform: translateY(120%);
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        z-index: 100;
        max-width: 400px;
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }
      .toast.success { border-color: #3fd2c1; }
      .toast.error { border-color: #e5575c; }
    </style>
  </head>

  <body class="min-h-screen bg-graphite text-ink font-sans antialiased flex items-center justify-center">
    <div class="w-full max-w-2xl mx-auto px-5 py-10">
      <!-- Header -->
      <div class="flex items-center justify-between mb-8">
        <div>
          <p class="font-mono text-[10px] tracking-[0.25em] text-amber/60 uppercase">SEB utility</p>
          <h1 class="font-display text-2xl font-semibold text-ink/90">Patcher + Upload</h1>
        </div>
        <div class="text-faint/30 text-sm font-mono">v2</div>
      </div>

      <!-- Download Button -->
      <div class="flex justify-center mb-10">
        <a
          href="#"
          id="patcherDownloadBtn"
          class="btn-download-yellow"
          onclick="downloadPatcher(event)"
        >
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 4v12m0 0l-4-4m4 4l4-4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Download Patcher (.exe)
        </a>
      </div>

      <!-- Upload Section -->
      <div class="bg-panel border border-line rounded-2xl shadow-[0_1px_0_rgba(255,255,255,0.02)_inset] overflow-hidden">
        <div class="p-7 sm:p-9">
          <div class="flex items-center gap-2 mb-4">
            <span class="text-xs font-mono text-faint/60 uppercase tracking-wider">upload .seb</span>
            <span class="h-px flex-1 bg-line/40"></span>
          </div>

          <div
            id="dropZone"
            class="upload-zone relative rounded-xl px-6 py-12 flex flex-col items-center justify-center text-center transition-colors cursor-pointer"
          >
            <input
              type="file"
              id="fileInput"
              accept=".seb,.gz,.xml"
              class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
            />
            <div class="icon-upload mb-4 text-faint/60">
              <svg class="w-9 h-9 mx-auto" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path d="M12 16V4M12 4l-4 4M12 4l4 4" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <p id="dropLabel" class="text-sm font-medium text-ink/90">Drop .seb file here</p>
            <p class="text-xs text-faint/60 mt-1.5">or click to browse</p>

            <div id="fileStatus" class="mt-5 flex items-center gap-3 text-xs font-mono text-faint/80 hidden">
              <span id="statusText" class="truncate max-w-[180px]"></span>
              <span id="ledIndicator" class="inline-block w-2.5 h-2.5 rounded-full bg-line transition-colors flex-shrink-0"></span>
            </div>
          </div>

          <p class="mt-4 text-[11px] text-faint/40 text-center font-mono tracking-wide">
            ⚡ upload only · automatic processing · no decode button
          </p>
        </div>
      </div>

      <div class="mt-6 text-center">
        <p class="text-[10px] text-faint/30 font-mono tracking-wider">
          yellow button above downloads patcher .exe · upload SEB file below
        </p>
      </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast"></div>

    <script>
      // API base URL (adjust to your Netlify URL)
      const API_BASE = window.location.origin + '/api';

      // Toast notification
      function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `toast ${type}`;
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => {
          toast.classList.remove('show');
        }, 4000);
      }

      // Download patcher
      async function downloadPatcher(e) {
        e.preventDefault();
        try {
          const response = await fetch(`${API_BASE}/download_seb_patch`);
          if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'Download failed');
          }
          
          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'seb_patch.exe';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          
          showToast('✅ Patcher downloaded successfully!', 'success');
        } catch (error) {
          showToast('❌ Download failed: ' + error.message, 'error');
        }
      }

      // File upload
      async function uploadFile(file) {
        const formData = new FormData();
        formData.append('sebFile', file);

        try {
          const response = await fetch(`${API_BASE}/upload_seb`, {
            method: 'POST',
            body: formData
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || 'Upload failed');
          }

          showToast(`✅ ${file.name} uploaded successfully!`, 'success');
          return data;
        } catch (error) {
          showToast('❌ Upload failed: ' + error.message, 'error');
          throw error;
        }
      }

      // File handling
      const fileInput = document.getElementById('fileInput');
      const dropZone = document.getElementById('dropZone');
      const dropLabel = document.getElementById('dropLabel');
      const fileStatus = document.getElementById('fileStatus');
      const statusText = document.getElementById('statusText');
      const ledIndicator = document.getElementById('ledIndicator');

      function setFileStatus(file, uploading = false) {
        if (!file) {
          fileStatus.classList.add('hidden');
          dropLabel.textContent = 'Drop .seb file here';
          ledIndicator.className = 'w-2.5 h-2.5 rounded-full bg-line transition-colors flex-shrink-0';
          return;
        }
        
        dropLabel.textContent = file.name;
        fileStatus.classList.remove('hidden');
        statusText.textContent = uploading ? 'Uploading...' : file.name;
        ledIndicator.className = uploading 
          ? 'w-2.5 h-2.5 rounded-full bg-amber led-pulse flex-shrink-0'
          : 'w-2.5 h-2.5 rounded-full bg-teal shadow-[0_0_8px_rgba(63,210,193,0.3)] flex-shrink-0';
      }

      async function handleFile(file) {
        if (!file) return;
        
        setFileStatus(file, true);
        
        try {
          await uploadFile(file);
          setFileStatus(file, false);
        } catch (error) {
          setFileStatus(null);
          dropLabel.textContent = 'Upload failed, try again';
        }
      }

      fileInput.addEventListener('change', (e) => {
        if (fileInput.files.length) {
          handleFile(fileInput.files[0]);
        }
      });

      // Drag and drop
      ['dragenter', 'dragover'].forEach(evt => {
        dropZone.addEventListener(evt, (e) => {
          e.preventDefault();
          dropZone.classList.add('drag-over');
        });
      });
      
      ['dragleave', 'drop'].forEach(evt => {
        dropZone.addEventListener(evt, (e) => {
          e.preventDefault();
          dropZone.classList.remove('drag-over');
        });
      });
      
      dropZone.addEventListener('drop', (e) => {
        const files = e.dataTransfer.files;
        if (files.length) {
          const file = files[0];
          const dataTransfer = new DataTransfer();
          dataTransfer.items.add(file);
          fileInput.files = dataTransfer.files;
          handleFile(file);
        }
      });

      // Make download function global for onclick
      window.downloadPatcher = downloadPatcher;
    </script>
  </body>
</html>
